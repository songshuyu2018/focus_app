<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      cursor: pointer; user-select: none;
      font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    }
    .emoji { font-size: min(20vw, 160px); margin-bottom: 24px; }
    .title { font-size: min(8vw, 56px); font-weight: 700; color: #4fc3f7; margin-bottom: 16px; }
    .time { font-size: min(4vw, 28px); color: rgba(255,255,255,0.65); margin-bottom: 8px; }
    .hint { font-size: min(3vw, 18px); color: rgba(255,255,255,0.35); margin-top: 48px; }
  </style>
</head>
<body onclick="window.__TAURI__?.window.getCurrent().close()">
  <div class="emoji">💧</div>
  <div class="title">该喝水啦！</div>
  <div class="time" id="timeDisplay"></div>
  <div class="hint">点击屏幕任意位置关闭</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const time = params.get("time") || "";
    document.getElementById("timeDisplay").textContent = time ? "现在时间：" + time : "";
  </script>
</body>
</html>
